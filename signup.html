<!DOCTYPE html>

<head>

  <title>OneLunch App – Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>

  <div class="container">
    <h1>Create an Account</h1>
    <p class="subtitle">Sign up to get started</p>

    <form>
      <div class="input-group">
        <input type="text" placeholder="Name" required />
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email Address" required />
      </div>

      <div class="input-group password">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" class="eye" data-target="password">👁</button>
      </div>

      <div class="input-group password">
        <input type="password" id="confirmPassword" placeholder="Verify Password" required />
        <button type="button" class="eye" data-target="confirmPassword">👁</button>
      </div>

      <button class="primary-btn">Sign Up</button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <button class="google-btn">
      Continue with Google
    </button>

    <p class="login-link">
      Already have an account? <a href="">Log in</a>
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
