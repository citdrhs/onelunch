<script>
// z-order trick for svg rooms
let activeRoom = null;
let activePlaceholder = null;

function bringToFront(g) {
  if (activeRoom === g) return;
  restoreActive();
  const parent = g.parentNode;
  activePlaceholder = document.createComment('room-placeholder');
  parent.insertBefore(activePlaceholder, g);
  parent.appendChild(g);
  activeRoom = g;
}

function restoreActive() {
  if (!activeRoom || !activePlaceholder) return;
  if (activePlaceholder.parentNode) {
    activePlaceholder.parentNode.insertBefore(activeRoom, activePlaceholder);
    activePlaceholder.parentNode.removeChild(activePlaceholder);
  }
  activeRoom = null;
  activePlaceholder = null;
}

function showFloor(floor, buttonEl) {
  document.querySelectorAll('.floor-map').forEach(function (map) {
    map.classList.remove('active');
  });
  document.querySelectorAll('.floor-tab').forEach(function (tab) {
    tab.classList.remove('active');
  });

  document.getElementById(floor + '-floor').classList.add('active');
  if (buttonEl) {
    buttonEl.classList.add('active');
  }

  restoreActive();
  var mapTip = document.getElementById('map-tooltip');
  if (mapTip) {
    mapTip.style.display = 'none';
  }
}

(function () {
  // slideout + tooltip
  var panel = document.getElementById('room-panel');
  var tooltip = document.getElementById('map-tooltip');
  var mapContainer = document.querySelector('.map-container');

  function closeRoomPanel() {
    panel.classList.remove('active');
    panel.setAttribute('aria-hidden', 'true');
    document.getElementById('room-panel-number').textContent = 'Room';
    document.getElementById('room-panel-name').textContent = 'Click a room to see details';
    document.getElementById('room-panel-desc').textContent = 'Details coming soon.';
    if (mapContainer) {
      mapContainer.classList.remove('room-panel-open');
    }
    document.querySelectorAll('.room-group').forEach(function (r) {
      r.classList.remove('selected');
      r.classList.remove('room-group--hover');
    });
    restoreActive();
    if (tooltip) {
      tooltip.style.display = 'none';
    }
  }

  document.querySelectorAll('.room-group').forEach(function (g) {
    g.addEventListener('click', function () {
      restoreActive();
      var num = g.getAttribute('data-room');
      var labelEl = g.querySelector('.room-label');
      var labelText = labelEl ? labelEl.textContent.trim() : '';
      var display = labelText || 'Room ' + num;
      document.getElementById('room-panel-number').textContent = display;
      document.getElementById('room-panel-name').textContent = display;
      document.getElementById('room-panel-desc').textContent = 'Click to add details';
      panel.classList.add('active');
      panel.setAttribute('aria-hidden', 'false');
      if (mapContainer) {
        mapContainer.classList.add('room-panel-open');
      }
      document.querySelectorAll('.room-group').forEach(function (r) {
        r.classList.remove('selected');
      });
      g.classList.add('selected');
      if (tooltip) {
        tooltip.style.display = 'none';
      }
    });
  });

  document.addEventListener(
    'click',
    function (e) {
      var el = e.target;
      if (el.nodeType !== 1) {
        el = el.parentElement;
      }
      if (!el || !el.closest || !el.closest('#room-panel-close')) {
        return;
      }
      if (!panel.classList.contains('active')) {
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      closeRoomPanel();
    },
    true
  );

  window.closeRoomMapPanel = closeRoomPanel;
})();

const tooltip = document.getElementById('map-tooltip');

document.querySelectorAll('.room-group').forEach((g) => {
  g.addEventListener('mouseenter', () => bringToFront(g));
});

document.querySelectorAll('.floor1-svg, .floor2-svg').forEach((svg) => {
  svg.addEventListener('mouseleave', () => {
    restoreActive();
    if (tooltip) tooltip.style.display = 'none';
  });
});

document.querySelectorAll('.floor1-svg, .floor2-svg').forEach((svg) => {
  svg.addEventListener('mouseover', (e) => {
    if (!e.target.closest('.room-group')) {
      restoreActive();
      if (tooltip) tooltip.style.display = 'none';
    }
  });
});

</script>
