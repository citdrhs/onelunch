{% extends "base.html" %}
{% block title %}Create account — Onelunch{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <h1>Choose your role</h1>
    <p class="subtitle">Select what you are to get started</p>
    <div class="role-buttons reveal">
      <a href="{{ url_for('register_teacher') }}" class="btn btn-primary btn-lg">
        <div class="role-icon">📚</div>
        <div class="role-label">Teacher</div>
      </a>
      <a href="{{ url_for('register_student') }}" class="btn btn-secondary btn-lg">
        <div class="role-icon">👨‍🎓</div>
        <div class="role-label">Student</div>
      </a>
      <a href="{{ url_for('register_admin') }}" class="btn btn-secondary btn-lg">
        <div class="role-icon">⚙️</div>
        <div class="role-label">Admin</div>
      </a>
    </div>
    <div class="divider"><span>or</span></div>
    <div class="login-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
  </div>
</div>
{% endblock %}
