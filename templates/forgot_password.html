{% extends "base.html" %}
{% block title %}Reset password — Onelunch{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <h1>Reset your password</h1>
    <p class="subtitle">Enter your email and we’ll give you a link to set a new password.</p>
    <form method="post" action="{{ url_for('forgot_password') }}">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@school.edu" required autocomplete="email">
      </div>
      <button type="submit" class="primary-btn">Get reset link</button>
    </form>
    <div class="login-link"><a href="{{ url_for('login') }}">Back to log in</a></div>
  </div>
</div>
{% endblock %}
