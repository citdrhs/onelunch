{% extends "base.html" %}
{% block title %}Set new password — Onelunch{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a new password. You’ll use it to log in from now on.</p>
    <form method="post" action="{{ url_for('reset_password', token=token) }}">
      <div class="input-group password">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        <button type="button" class="eye" aria-label="Show password" onclick="togglePassword('password', this)">👁️</button>
      </div>
      <button type="submit" class="primary-btn">Update password</button>
    </form>
  </div>
</div>
{% endblock %}
