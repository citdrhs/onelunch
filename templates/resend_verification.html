{% extends "base.html" %}
{% block title %}Resend verification — Onelunch{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <h1>Verify Your Email</h1>
    <p class="subtitle">Enter your email address to receive a 6-digit verification code.</p>
    <form class="login" method="post" action="{{ url_for('resend_verification') }}">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@school.edu" required autocomplete="email">
      </div>
      <button type="submit" class="primary-btn">Send Verification Code</button>
    </form>
    <div class="login-link"><a href="{{ url_for('login') }}">Back to login</a></div>
  </div>
</div>
{% endblock %}
