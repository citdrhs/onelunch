{% extends "base.html" %}
{% block title %}Request a club space — Onelunch{% endblock %}
{% block content %}
<div class="page-container">
  <div class="page-header reveal">
    <h1>Request a club space</h1>
    <p class="subtitle">Submit a request for a room during lunch. The teacher for that room will review it.</p>
  </div>
  <div class="card reveal">
    <form method="post" action="{{ url_for('club_request') }}" class="form-grid">
      {% include '_csrf.html' %}
      <div class="form-group">
        <label for="club_name">Club / group name *</label>
        <input type="text" id="club_name" name="club_name" required maxlength="200" placeholder="e.g. Chess Club" aria-label="Club name">
      </div>
      <div class="form-group">
        <label for="room_id">Room *</label>
        <select id="room_id" name="room_id" required aria-label="Room">
          <option value="">— Select room —</option>
          {% for r in rooms %}
          <option value="{{ r.id }}">{{ r.dropdown_caption }}{% if r.teacher_name %} — {{ r.teacher_name }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="day">Day *</label>
        <select id="day" name="day" required>
          <option value="M">Monday</option>
          <option value="T">Tuesday</option>
          <option value="W">Wednesday</option>
          <option value="R">Thursday</option>
          <option value="F">Friday</option>
        </select>
      </div>
      <div class="form-group">
        <fieldset>
          <legend>Lunch *</legend>
          <label><input type="radio" name="lunch" value="A" required> A lunch</label>
          <label><input type="radio" name="lunch" value="B"> B lunch</label>
        </fieldset>
      </div>
      <div class="form-group">
        <fieldset>
          <legend>Time needed *</legend>
          <label><input type="radio" name="half" value="first_half" required> First half</label>
          <label><input type="radio" name="half" value="second_half"> Second half</label>
          <label><input type="radio" name="half" value="full"> Full lunch</label>
        </fieldset>
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label for="notes">Notes / topic (optional, max 300 characters)</label>
        <textarea id="notes" name="notes" rows="3" maxlength="300" placeholder="What will you use the space for?"></textarea>
      </div>
      <div class="form-group">
        <label for="requester_name">Your name *</label>
        <input type="text" id="requester_name" name="requester_name" required maxlength="120" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="requester_email">Your email (optional)</label>
        <input type="email" id="requester_email" name="requester_email" maxlength="200" autocomplete="email" placeholder="For follow-up">
      </div>
      <div class="form-actions" style="grid-column: 1 / -1;">
        <button type="submit" class="btn btn-primary">Submit request</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
