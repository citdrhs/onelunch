<!DOCTYPE html>
<html>
<head>




<title>Login Page</title>
 


<style>

</style>
</head>
<body>

<h1 style="font-family: Georgia, 'Times New Roman', Times, serif">Login</h1>
<p>Welcome to OneLunch App! If you have an account login here: </p>
<p>If you do not have an account, please navigate to the Sign Up Page.</p>

<form class="login">
  <label for="email">Email:</label>
  <input type="email" id="email" placeholder="Enter email" name="email">
  <label for="password">Password:</label>
  <input type="password" id="pwd" placeholder="Enter password" name="password">
  <button type="submit">Submit</button>
</form>

</body>
</html>
